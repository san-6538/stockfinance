services:
  backend:
    build: ./backend
    environment:
      - DATA_DIR=/data
      - DB_PATH=/data/analytics/warehouse.duckdb
      - SEED_ON_STARTUP=true
      - CORS_ORIGINS=*
    volumes:
      - warehouse-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""        # use nginx /api proxy
    environment:
      - NGINX_PORT=80
      - BACKEND_ORIGIN=http://backend:8000
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  warehouse-data:
