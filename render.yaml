# Render Blueprint — single service: the backend builds & serves the React UI.
# One URL, same-origin API. Docs: https://render.com/docs/blueprint-spec
#
#   Render Dashboard → New → Blueprint → pick this repo → Apply.
#   Open the service's URL → the full app (UI + API at /docs).

services:
  - type: web
    name: stockfinance
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /data
      - key: DB_PATH
        value: /data/analytics/warehouse.duckdb
      - key: STATIC_DIR
        value: /app/static
      - key: SEED_ON_STARTUP
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
    # Persistent DuckDB storage needs a paid instance. On free the warehouse is
    # ephemeral and re-seeds on cold start. To persist, bump `plan` and add:
    # disk:
    #   name: warehouse
    #   mountPath: /data
    #   sizeGB: 1
