# Fly.io config for the backend API.
#   fly launch --no-deploy        (creates the app; accept this config)
#   fly volumes create warehouse --size 1 --region <your-region>
#   fly deploy
#
# Deploy the frontend separately (e.g. `fly launch` in ../frontend, or any
# static host) and set its VITE_API_URL to https://<this-app>.fly.dev

app = "fdp-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  DB_PATH = "/data/analytics/warehouse.duckdb"
  SEED_ON_STARTUP = "true"
  CORS_ORIGINS = "*"
  PORT = "8000"

[[mounts]]
  source = "warehouse"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
